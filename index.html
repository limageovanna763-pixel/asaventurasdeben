<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>As Aventuras de Ben - Explore o ABC 🐻</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF6E5;
    --card: #FFFFFF;
    --honey: #F5A93F;
    --honey-dark: #D98A1E;
    --forest: #5B8C5A;
    --forest-dark: #3F6B40;
    --berry: #E8604E;
    --teal: #3E7C74;
    --brown: #4A2F22;
    --outline: #EAD9B8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    color: var(--brown);
    margin: 0;
    padding: 20px 14px 40px;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }
  .honeycomb-bg {
    position: fixed; inset: 0; z-index: 0; opacity: 0.25; pointer-events: none;
  }
  .wrap {
    position: relative; z-index: 1; width: 100%; max-width: 600px; text-align: center;
  }
  header h1 {
    font-family: 'Baloo 2', sans-serif;
    font-size: clamp(28px, 6vw, 36px);
    color: var(--forest-dark);
    margin: 10px 0 5px;
  }
  .subtitle {
    font-weight: 700; color: var(--honey-dark); margin: 0 0 20px; font-size: 16px;
  }

  /* ---- Tela 1: Painel do Alfabeto ---- */
  .grid-abc {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-top: 10px;
  }
  .btn-letra {
    background: var(--card);
    border: 3px solid var(--outline);
    border-radius: 18px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--forest-dark);
    padding: 15px 0;
    cursor: pointer;
    box-shadow: 0 5px 0 var(--outline);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-letra:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 var(--outline);
  }

  /* ---- Tela 2: Detalhes da Letra ---- */
  .hidden { display: none !important; }
  .view-detalhes {
    animation: fadeIn 0.3s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

  .topo-detalhes {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
  }
  .btn-voltar {
    background: var(--honey);
    border: none; border-radius: 50px;
    color: white; font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 16px;
    padding: 10px 18px; cursor: pointer; box-shadow: 0 4px 0 var(--honey-dark);
  }
  .btn-voltar:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--honey-dark); }

  .letra-gigante {
    font-family: 'Baloo 2', sans-serif; font-size: 90px; font-weight: 800;
    margin: 0; line-height: 1; text-shadow: 4px 4px 0 var(--outline);
  }

  /* Cards de Palavras */
  .container-palavras {
    display: flex; flex-direction: column; gap: 16px; margin-top: 15px;
  }
  .card-palavra {
    background: var(--card);
    border: 4px solid var(--outline);
    border-radius: 24px;
    padding: 16px;
    display: flex; align-items: center; gap: 20px;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--outline);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card-palavra:active {
    transform: scale(0.98) translateY(4px);
    box-shadow: 0 2px 0 var(--outline);
  }
  .card-palavra .emoji { font-size: 55px; }
  .textos-palavra { text-align: left; display: flex; flex-direction: column; gap: 2px; }
  .palavra-en { font-family: 'Baloo 2', sans-serif; font-size: 24px; font-weight: 800; color: var(--teal); }
  .palavra-pt { font-size: 18px; font-weight: 700; color: var(--berry); }
  .flag { margin-right: 6px; font-size: 16px; }

  /* Instrução fofa */
  .dica { font-weight: 700; color: #8a7a5f; margin-top: 20px; font-size: 15px; }

  /* Balão do Urso */
  .bear-box { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
  .bubble {
    background: white; border: 3px solid var(--outline); border-radius: 18px;
    padding: 10px 14px; font-family: 'Baloo 2', sans-serif; font-weight: 700;
    color: var(--forest-dark); position: relative; max-width: 200px;
  }
  .bubble::after {
    content:""; position: absolute; left: -14px; top: 50%; transform: translateY(-50%);
    border: 8px solid transparent; border-right-color: white;
  }
  .bear-svg { width: 70px; height: 70px; animation: gentle 3s infinite ease-in-out; }
  @keyframes gentle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

  .yt-link {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin: 30px auto 0; max-width: 340px; background: #FF3B30; color: #fff;
    text-decoration: none; font-family: 'Baloo 2', sans-serif; font-weight: 700;
    font-size: 15px; padding: 12px 20px; border-radius: 999px; box-shadow: 0 4px 0 #C6281F;
  }
</style>

const CORES = ["#5B8C5A", "#E8604E", "#3E7C74", "#D98A1E"];
const viewMenu = document.getElementById('viewMenu');
const viewDetalhes = document.getElementById('viewDetalhes');
const letraTitulo = document.getElementById('letraTitulo');
const listaPalavras = document.getElementById('listaPalavras');
const bubbleBen = document.getElementById('bubbleBen');

// Inicializa o Painel de Letras Principal
function initMenu() {
  viewMenu.innerHTML = '';
  Object.keys(ALFABETO_DADOS).forEach((letra, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-letra';
    btn.textContent = letra;
    btn.style.color = CORES[i % CORES.length];
    btn.onclick = () => verLetra(letra);
    viewMenu.appendChild(btn);
  });
}

// Navega para a página da letra escolhida
function verLetra(letra) {
  speechSynthesis.cancel();
  viewMenu.classList.add('hidden');
  viewDetalhes.classList.remove('hidden');
  
  letraTitulo.textContent = letra;
  letraTitulo.style.color = CORES[letra.charCodeAt(0) % CORES.length];
  
  bubbleBen.textContent = "Letra " + letra + "! O que vamos descobrir?";
  falarTexto(letra, 'en-US');

  // Renderiza as 3 palavras dinâmicas daquela letra
  listaPalavras.innerHTML = '';
  ALFABETO_DADOS[letra].forEach(item => {
    const card = document.createElement('div');
    card.className = 'card-palavra';
    card.onclick = () => interagirComPalavra(item);

    card.innerHTML = `
      <span class="emoji">${item.emoji}</span>
      <div class="textos-palavra">
        <span class="palavra-en"><span class="flag">🇺🇸</span>${item.en}</span>
        <span class="palavra-pt"><span class="flag">🇧🇷</span>${item.pt}</span>
      </div>
    `;
    listaPalavras.appendChild(card);
  });
}

// Volta para a tela inicial do alfabeto
function voltarParaMenu() {
  speechSynthesis.cancel();
  viewDetalhes.classList.add('hidden');
  viewMenu.classList.remove('hidden');
  bubbleBen.textContent = "Escolha outra letra para explorar!";
}

// Executa as vozes e o balão do Ben ao tocar em um card
async function interagirComPalavra(item) {
  speechSynthesis.cancel();
  
  // Atualiza o balão do ursinho
  bubbleBen.textContent = item.en + " significa " + item.pt + "!";
  
  // Fala em Inglês
  await falarTexto(item.en, 'en-US');
  // Pequena pausa natural
  await new Promise(r => setTimeout(r, 200));
  // Fala em Português
  await falarTexto(item.pt, 'pt-BR');
}

// Função utilitária de voz oficial da Speech API
function falarTexto(texto, idioma) {
  return new Promise((resolve) => {
    if (!('speechSynthesis' in window)) { resolve(); return; }
    const utterance = new SpeechSynthesisUtterance(texto);
    utterance.lang = idioma;
    utterance.rate = 0.82; // Velocidade infantil ideal
    utterance.pitch = 1.15; // Voz um pouco mais fina/fofa
    utterance.onend = resolve;
    utterance.onerror = resolve;
    speechSynthesis.speak(utterance);
  });
}
