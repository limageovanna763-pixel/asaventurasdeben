<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>As Aventuras de Ben - Explore o ABC 🐻</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF8EB;
    --card: #FFFFFF;
    --honey: #F5A93F;
    --honey-dark: #D98A1E;
    --forest: #5B8C5A;
    --forest-dark: #3F6B40;
    --berry: #E8604E;
    --teal: #3E7C74;
    --brown: #4A2F22;
    --outline: #E2CFB4;
    --bubble-bg: #FFFDF9;
  }
  
  * { 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
  }
  
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    color: var(--brown);
    margin: 0;
    padding: 16px 12px 40px;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    background-image: radial-gradient(var(--outline) 1px, transparent 1px);
    background-size: 24px 24px;
  }
  
  .wrap {
    width: 100%;
    max-width: 520px;
    text-align: center;
    display: flex;
    flex-direction: column;
  }

  /* ---- Brand Header (Dinâmico) ---- */
  header {
    background: var(--card);
    border: 4px solid var(--outline);
    border-radius: 28px;
    padding: 16px 20px;
    margin-bottom: 20px;
    box-shadow: 0 8px 0 var(--outline);
    transition: all 0.3s ease;
  }
  
  header.mini {
    padding: 8px 16px;
    margin-bottom: 14px;
    border-radius: 18px;
    box-shadow: 0 4px 0 var(--outline);
  }

  header h1 {
    font-family: 'Baloo 2', sans-serif;
    font-size: clamp(28px, 7vw, 38px);
    font-weight: 800;
    color: var(--forest-dark);
    margin: 0;
    line-height: 1.2;
  }
  
  header.mini h1 {
    font-size: 20px;
  }

  .subtitle {
    font-weight: 800;
    color: var(--honey-dark);
    margin: 4px 0 0;
    font-size: 15px;
    font-family: 'Baloo 2', sans-serif;
  }
  
  header.mini .subtitle { display: none; }

  /* ---- Personagem Ben & Balão ---- */
  .bear-box {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
    background: rgba(255,255,255,0.5);
    padding: 10px 16px;
    border-radius: 20px;
    border: 2px dashed var(--outline);
  }
  
  .bubble {
    background: var(--bubble-bg);
    border: 3px solid var(--outline);
    border-radius: 20px;
    padding: 10px 16px;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--brown);
    position: relative;
    flex: 1;
    box-shadow: 0 4px 0 var(--outline);
    text-align: left;
  }
  
  .bubble::after {
    content: "";
    position: absolute;
    left: -14px;
    top: 50%;
    transform: translateY(-50%);
    border: 8px solid transparent;
    border-right-color: var(--bubble-bg);
  }
  .bubble::before {
    content: "";
    position: absolute;
    left: -18px;
    top: 50%;
    transform: translateY(-50%);
    border: 9px solid transparent;
    border-right-color: var(--outline);
    z-index: -1;
  }
  
  .bear-svg {
    width: 68px;
    height: 68px;
    animation: gentle 3s infinite ease-in-out;
    flex-shrink: 0;
  }
  
  @keyframes gentle {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-4px) rotate(2deg); }
  }

  /* ---- TELA 1: Painel do Alfabeto ---- */
  .grid-abc {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    animation: fadeIn 0.3s ease-out;
  }
  
  .btn-letra {
    background: var(--card);
    border: 3px solid var(--outline);
    border-radius: 22px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 34px;
    font-weight: 800;
    padding: 12px 0;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--outline);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  
  .btn-letra:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 var(--outline);
  }

  /* ---- TELA 2: Visualização da Letra ---- */
  .hidden { display: none !important; }
  
  .view-detalhes {
    animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .topo-detalhes {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    background: var(--card);
    padding: 10px 16px;
    border-radius: 24px;
    border: 3px solid var(--outline);
  }
  
  .btn-voltar {
    background: var(--honey);
    border: none;
    border-radius: 50px;
    color: white;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 16px;
    padding: 10px 18px;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--honey-dark);
  }
  
  .btn-voltar:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 var(--honey-dark);
  }

  .letra-gigante {
    font-family: 'Baloo 2', sans-serif;
    font-size: 72px;
    font-weight: 800;
    margin: 0;
    line-height: 1;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
  }

  /* ---- Cards Estilo Adesivo ---- */
  .container-palavras {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  
  .card-palavra {
    background: var(--card);
    border: 3px solid var(--outline);
    border-radius: 24px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 18px;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--outline);
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative;
    overflow: hidden;
  }
  
  .card-palavra::before {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0.03;
    background-image: radial-gradient(#000 1px, transparent 1px);
    background-size: 8px 8px;
    pointer-events: none;
  }
  
  .card-palavra:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 var(--outline);
  }
  
  .card-palavra.animar .emoji {
    animation: popEmoji 0.4s ease;
  }
  
  @keyframes popEmoji {
    0% { transform: scale(1); }
    50% { transform: scale(1.3) rotate(-10deg); }
    100% { transform: scale(1); }
  }

  .card-palavra .emoji {
    font-size: 56px;
    transition: transform 0.2s;
    display: inline-block;
  }
  
  .textos-palavra {
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  
  .palavra-en {
    font-family: 'Baloo 2', sans-serif;
    font-size: 26px;
    font-weight: 800;
  }
  
  .palavra-pt {
    font-size: 17px;
    font-weight: 700;
    color: #6E5A4E;
  }
  
  .flag {
    margin-right: 6px;
    font-size: 16px;
    vertical-align: middle;
  }

  .dica {
    font-weight: 800;
    color: #8A7A5F;
    margin: 12px 0;
    font-size: 14px;
    background: rgba(226, 207, 180, 0.3);
    padding: 6px 12px;
    border-radius: 99px;
    display: inline-block;
    align-self: center;
  }

  /* ---- Rodapé YouTube ---- */
  .yt-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 24px;
    background: #FF3B30;
    color: #fff;
    text-decoration: none;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 15px;
    padding: 14px 24px;
    border-radius: 999px;
    box-shadow: 0 5px 0 #C6281F;
    transition: transform 0.1s;
  }
  
  .yt-link:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #C6281F;
  }
</style>
</head>

const CORES = ["#5B8C5A", "#E8604E", "#3E7C74", "#D98A1E"];
const viewMenu = document.getElementById('viewMenu');
const viewDetalhes = document.getElementById('viewDetalhes');
const letraTitulo = document.getElementById('letraTitulo');
const listaPalavras = document.getElementById('listaPalavras');
const bubbleBen = document.getElementById('bubbleBen');
const mainHeader = document.getElementById('mainHeader');

function initMenu() {
  viewMenu.innerHTML = '';
  mainHeader.classList.remove('mini');
  Object.keys(ALFABETO_DADOS).forEach((letra, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-letra';
    btn.textContent = letra;
    const cor = CORES[i % CORES.length];
    btn.style.color = cor;
    btn.style.borderColor = varColorWithAlpha(cor, 0.3);
    btn.onclick = () => verLetra(letra, cor);
    viewMenu.appendChild(btn);
  });
}

function verLetra(letra, corDestaque) {
  speechSynthesis.cancel();
  viewMenu.classList.add('hidden');
  viewDetalhes.classList.remove('hidden');
  mainHeader.classList.add('mini'); // Encolhe o cabeçalho principal
  
  letraTitulo.textContent = letra;
  letraTitulo.style.color = corDestaque;
  
  bubbleBen.textContent = "Letra " + letra + "! Toque nas figuras abaixo!";
  falarTexto(letra, 'en-US');

  listaPalavras.innerHTML = '';
  ALFABETO_DADOS[letra].forEach(item => {
    const card = document.createElement('div');
    card.className = 'card-palavra';
    card.style.borderColor = varColorWithAlpha(corDestaque, 0.4);
    
    // Passamos o próprio elemento clicado para aplicar a animação
    card.onclick = () => interagirComPalavra(item, card, corDestaque);

    card.innerHTML = `
      <span class="emoji">${item.emoji}</span>
      <div class="textos-palavra">
        <span class="palavra-en" style="color: ${corDestaque}"><span class="flag">🇺🇸</span>${item.en}</span>
        <span class="palavra-pt"><span class="flag">🇧🇷</span>${item.pt}</span>
      </div>
    `;
    listaPalavras.appendChild(card);
  });
}

function voltarParaMenu() {
  speechSynthesis.cancel();
  viewDetalhes.classList.add('hidden');
  viewMenu.classList.remove('hidden');
  mainHeader.classList.remove('mini');
  bubbleBen.textContent = "Escolha outra letra para explorar!";
}

async function interagirComPalavra(item, elementoCard, corDestaque) {
  speechSynthesis.cancel();
  
  // Gatilho da animação visual de pulo no emoji
  elementoCard.classList.remove('animar');
  void elementoCard.offsetWidth; // truque para resetar animação CSS
  elementoCard.classList.add('animar');
  
  bubbleBen.textContent = item.en + " em português é " + item.pt + "!";
  
  await falarTexto(item.en, 'en-US');
  await new Promise(r => setTimeout(r, 150));
  await falarTexto(item.pt, 'pt-BR');
}

function falarTexto(texto, idioma) {
  return new Promise((resolve) => {
    if (!('speechSynthesis' in window)) { resolve(); return; }
    const utterance = new SpeechSynthesisUtterance(texto);
    utterance.lang = idioma;
    utterance.rate = 0.83; 
    utterance.pitch = 1.15; 
    utterance.onend = resolve;
    utterance.onerror = resolve;
    speechSynthesis.speak(utterance);
  });
}

// Função auxiliar para deixar as bordas combinando suavemente com a cor da letra
function varColorWithAlpha(hex, alpha) {
  return hex + Math.round(alpha * 255).toString(16).padStart(2, '0');
}
